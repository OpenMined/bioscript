plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.bioscript'
version = '0.1.0'

def reactNativeArchitectures() {
  def value = project.getProperties().get('reactNativeArchitectures')
  return value ? value.split(',') : ['armeabi-v7a', 'x86', 'x86_64', 'arm64-v8a']
}

tasks.register('buildRustAndroid', Exec) {
  workingDir projectDir
  commandLine 'sh', '../scripts/build-rust-android.sh', *reactNativeArchitectures()
}

android {
  namespace 'expo.modules.bioscript'

  defaultConfig {
    versionCode 1
    versionName '0.1.0'
  }

  sourceSets {
    main {
      jniLibs.srcDirs = ['src/main/jniLibs']
    }
  }
}

tasks.matching { it.name == 'preBuild' }.configureEach {
  dependsOn tasks.named('buildRustAndroid')
}
