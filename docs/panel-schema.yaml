    derived_from:
      - "variants/rs713598.yaml"
    emits:
      - key: "taste_status"
        label: "Taste status"
        value_type: "string"
        format: "badge"
    logic:
      source:
        name: "Example derivation source"
        url: "https://example.org/panel-analysis-logic"
      description: >
        Optional human-readable description of the derivation logic implemented by the analysis script.
